<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RevMatch — Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text2: #8a8a8a;
    --text3: #555;
    --accent: #e8ff3d;
    --accent2: #ff4d2e;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--body);
    background: #050505;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 16px;
  }

  /* ── iPhone frame ── */
  .iphone {
    width: 375px;
    height: 812px;
    background: #000;
    border-radius: 54px;
    padding: 12px;
    box-shadow: 0 0 0 2px #2a2a2a, 0 0 0 14px #111, 0 30px 80px rgba(0,0,0,0.7);
    position: relative;
  }

  /* Side buttons */
  .iphone::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 130px;
    width: 4px;
    height: 60px;
    background: #1a1a1a;
    border-radius: 4px 0 0 4px;
  }
  .iphone::after {
    content: '';
    position: absolute;
    right: -16px;
    top: 160px;
    width: 4px;
    height: 90px;
    background: #1a1a1a;
    border-radius: 0 4px 4px 0;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border-radius: 42px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Notch */
  .notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 30px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 50;
  }

  /* Status bar */
  .statusbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
  }
  .statusbar-right { display: flex; gap: 6px; align-items: center; }
  .statusbar-right svg { width: 15px; height: 15px; }

  /* App header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 18px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--display);
    font-size: 30px;
    letter-spacing: 1.5px;
    color: var(--text);
    line-height: 1;
  }
  .logo span { color: var(--accent); }

  .header-icons { display: flex; gap: 18px; }
  .header-icons svg { width: 22px; height: 22px; color: var(--text); }

  /* Feed scroll area */
  .feed {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .feed::-webkit-scrollbar { width: 0; }

  /* Post */
  .post { border-bottom: 1px solid var(--border); }

  .post-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--display);
    font-size: 16px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .post-user { flex: 1; min-width: 0; }
  .post-name { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 4px; }
  .post-name svg { width: 13px; height: 13px; color: var(--accent); }
  .post-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }

  .post-more { color: var(--text2); cursor: pointer; }
  .post-more svg { width: 20px; height: 20px; }

  /* Post image */
  .post-img {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .post-img svg { width: 90px; height: 90px; color: rgba(255,255,255,0.06); }

  .car-tag {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .car-tag svg { width: 13px; height: 13px; color: var(--accent); }

  /* Post actions */
  .post-actions {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 14px 8px;
  }
  .action { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text); }
  .action svg { width: 24px; height: 24px; transition: transform 0.15s; }
  .action:active svg { transform: scale(1.2); }
  .action span { font-size: 13px; font-weight: 500; }
  .action.liked { color: var(--accent2); }
  .action.liked svg { fill: var(--accent2); }
  .action-spacer { flex: 1; }

  /* Post caption */
  .post-caption {
    padding: 0 14px 14px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .post-caption b { font-weight: 600; }
  .post-caption .hashtag { color: var(--accent); }
  .post-specs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .spec {
    font-size: 10px;
    font-family: var(--mono);
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text2);
  }

  /* Bottom nav */
  .bottomnav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 24px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    color: var(--text3);
    cursor: pointer;
  }
  .nav-item svg { width: 24px; height: 24px; }
  .nav-item.active { color: var(--accent); }
  .nav-fab {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-fab svg { width: 24px; height: 24px; color: var(--bg); }

  /* Home indicator */
  .home-bar {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    z-index: 60;
  }
</style>
</head>
<body>

<div class="iphone">
  <div class="screen">
    <div class="notch"></div>

    <!-- Status bar -->
    <div class="statusbar">
      <span>9:41</span>
      <div class="statusbar-right">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 22h20V2z" opacity="0.9"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="18" height="10" rx="2" opacity="0.9"/><rect x="21" y="10" width="1.5" height="4" rx="1"/></svg>
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="logo">REV<span>MATCH</span></div>
      <div class="header-icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
    </div>

    <!-- Feed -->
    <div class="feed" id="feed"></div>

    <!-- Bottom nav -->
    <div class="bottomnav">
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="nav-item">
        <div class="nav-fab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v2"/></svg>
      </div>
    </div>

    <div class="home-bar"></div>
  </div>
</div>

<script>
const posts = [
  {
    init: "MK", name: "Mike K.", handle: "@mikek_r34", time: "2h · Montclair, NJ",
    car: "2002 Nissan Skyline R34",
    bg: "radial-gradient(ellipse at 30% 40%, #1a2e1a 0%, #0a140a 100%)",
    likes: 342, comments: 28,
    caption: "Finally got the new wheels mounted. Volk TE37s in bronze hit different on Bayside Blue.",
    tags: ["RB26DETT", "Bronze TE37", "550whp"]
  },
  {
    init: "SP", name: "Spencer M.", handle: "@spence_gt3", time: "5h · Hoboken, NJ",
    car: "2021 Porsche 911 GT3",
    bg: "radial-gradient(ellipse at 60% 50%, #2e1a2e 0%, #14081a 100%)",
    likes: 891, comments: 64,
    caption: "Track day at NJMP this weekend. Who else is going? Weather looks perfect.",
    tags: ["Manual 6spd", "502 HP", "Track pkg"]
  },
  {
    init: "CR", name: "Carlos R.", handle: "@cr_sti", time: "8h · Parsippany, NJ",
    car: "2022 Subaru WRX STI",
    bg: "radial-gradient(ellipse at 40% 60%, #1a1a2e 0%, #08081a 100%)",
    likes: 156, comments: 19,
    caption: "Rally tune done. This thing is a different animal now. Pulls hard all the way to redline.",
    tags: ["Stage 2", "272 HP", "Recaro"]
  },
  {
    init: "AL", name: "Alex J.", handle: "@alexj_builds", time: "1d · Fairfield, NJ",
    car: "2019 BMW M3 Competition",
    bg: "radial-gradient(ellipse at 50% 40%, #2e2410 0%, #1a1305 100%)",
    likes: 478, comments: 41,
    caption: "New KW V3 coilovers installed. Sitting just right now. Sakhir Orange never gets old.",
    tags: ["S58", "503 HP", "KW V3"]
  }
];

const carSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-2m-6 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0m-8 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0"/></svg>`;
const carMini = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>`;
const verifySVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;

document.getElementById('feed').innerHTML = posts.map((p, i) => `
  <div class="post">
    <div class="post-head">
      <div class="avatar">${p.init}</div>
      <div class="post-user">
        <div class="post-name">${p.name} ${verifySVG}</div>
        <div class="post-meta">${p.handle} · ${p.time}</div>
      </div>
      <div class="post-more">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
      </div>
    </div>

    <div class="post-img" style="background:${p.bg};">
      ${carSVG}
      <div class="car-tag">${carMini} ${p.car}</div>
    </div>

    <div class="post-actions">
      <div class="action" onclick="toggleLike(this, ${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="like-count">${p.likes}</span>
      </div>
      <div class="action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>${p.comments}</span>
      </div>
      <div class="action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </div>
      <div class="action-spacer"></div>
      <div class="action">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
    </div>

    <div class="post-caption">
      <b>${p.handle}</b> ${p.caption}
      <div class="post-specs">
        ${p.tags.map(t => `<span class="spec">${t}</span>`).join('')}
      </div>
    </div>
  </div>
`).join('');

function toggleLike(el, i) {
  const countEl = el.querySelector('.like-count');
  if (el.classList.contains('liked')) {
    el.classList.remove('liked');
    countEl.textContent = posts[i].likes;
  } else {
    el.classList.add('liked');
    countEl.textContent = posts[i].likes + 1;
  }
}
</script>
</body>
</html>
